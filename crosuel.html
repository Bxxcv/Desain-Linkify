<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Portfolio - LINKify</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body {
    background: #fff;
    color: #111;
    padding-bottom: 60px;
  }

  /* CAROUSEL */
.carousel {
    position: relative;
    width: 100%;
    max-width: 420px;
    margin: 0 auto 20px;
    overflow: hidden;
    border-radius: 12px;
    border: 1.5px solid #e0e0e0;
  }

.carousel-track {
    display: flex;
    transition: transform 0.3s ease-in-out;
  }

.carousel-slide {
    width: 100%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #f9f9f9;
  }

  /* WRAPPER BUAT ANTI DOWNLOAD + COPYRIGHT */
.img-wrap {
    position: relative;
    width: 100%;
    background: #f5f5f5;
  }

.img-wrap img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
    /* Anti download */
    -webkit-user-drag: none;
    -khtml-user-drag: none;
    -moz-user-drag: none;
    -o-user-drag: none;
    user-drag: none;
    user-select: none;
    pointer-events: none;
  }

  /* COPYRIGHT DI TENGAH */
.copyright {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-25deg);
    background: rgba(0,0,0,0.35); /* gue tebelin warnanya */
    color: #fff;
    padding: 12px 24px;
    font-size: 32px; /* gue gedein */
    font-weight: 800; /* gue tebelin */
    border-radius: 10px;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.7); /* bayangan biar makin nongol */
    letter-spacing: 1px;
}

.caption {
    padding: 12px;
    font-size: 14px;
    text-align: center ;
    color: #333;
    background: #fff;
    border-top: 1px solid #e0e0e0;
  }

.prev,.next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 50%;
    font-size: 18px;
    z-index: 2;
  }

.prev { left: 10px; }
.next { right: 10px; }

.dots {
    text-align: center;
    padding: 10px 0;
    background: #fff;
  }

.dot {
    height: 8px;
    width: 8px;
    margin: 0 4px;
    background: #bbb;
    border-radius: 50%;
    display: inline-block;
    cursor: pointer;
  }

.dot.active {
    background: #d4ff00;
  }
</style>
</head>
<body>
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-slide">
          <div class="img-wrap">
            <img src="img/kreator.jpg" alt="Project 1">
            <div class="copyright">© LINKify 2026</div>
          </div>
          <div class="caption">Preview template kreator</div>
        </div>
        <div class="carousel-slide">
          <div class="img-wrap">
            <img src="img/dropship.jpg" alt="Project 2">
            <div class="copyright">© LINKify 2026</div>
          </div>
          <div class="caption">Preview template dropship</div>
        </div>
        <div class="carousel-slide">
          <div class="img-wrap">
            <img src="img/skincare.jpg" alt="Project 3">
            <div class="copyright">© LINKify 2026</div>
          </div>
          <div class="caption">Preview template skincare</div>
        </div>
        <div class="carousel-slide">
          <div class="img-wrap">
            <img src="img/kuliner.jpg" alt="Project 4">
            <div class="copyright">© LINKify 2026</div>
          </div>
          <div class="caption">Preview template kuliner</div>
        </div>
        <div class="carousel-slide">
          <div class="img-wrap">
            <img src="img/gadget.jpg" alt="Project 5">
            <div class="copyright">© LINKify 2026</div>
          </div>
          <div class="caption">Preview template gadget</div>
        </div>
      </div>

      <button class="prev">‹</button>
      <button class="next">›</button>
      <div class="dots"></div>
    </div>
    <!-- CAROUSEL END -->

<script>
const track = document.querySelector('.carousel-track');
const slides = Array.from(track.children);
const nextBtn = document.querySelector('.next');
const prevBtn = document.querySelector('.prev');
const dotsNav = document.querySelector('.dots');

let currentIndex = 0;

// Bikin titik navigasi
slides.forEach((_, i) => {
  const dot = document.createElement('span');
  dot.classList.add('dot');
  if (i === 0) dot.classList.add('active');
  dot.addEventListener('click', () => goToSlide(i));
  dotsNav.appendChild(dot);
});

const dots = Array.from(dotsNav.children);

function updateCarousel() {
  track.style.transform = `translateX(-${currentIndex * 100}%)`;
  dots.forEach((dot, i) => {
    dot.classList.toggle('active', i === currentIndex);
  });
}

function goToSlide(index) {
  currentIndex = index;
  updateCarousel();
}

nextBtn.addEventListener('click', () => {
  currentIndex = (currentIndex + 1) % slides.length;
  updateCarousel();
});

prevBtn.addEventListener('click', () => {
  currentIndex = (currentIndex - 1 + slides.length) % slides.length;
  updateCarousel();
});

// Blokir klik kanan di seluruh carousel
document.querySelector('.carousel').addEventListener('contextmenu', e => e.preventDefault());

// Swipe buat HP
let startX = 0;
track.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});
track.addEventListener('touchend', e => {
  let endX = e.changedTouches[0].clientX;
  if (startX - endX > 50) nextBtn.click();
  if (endX - startX > 50) prevBtn.click();
});
</script>

</body>
</html>
