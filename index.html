<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Studio | LINKify</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    body {
      background: #0F1014 radial-gradient(circle at 50% 0%, rgba(108, 92, 231, 0.2) 0%, transparent 70%);
      background-attachment: fixed;
    }
    .mobile-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
    }
    
    /* Header/Profile */
    .profile-section { text-align: center; margin-bottom: 32px; }
    .avatar-wrapper {
      width: 104px; height: 104px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      padding: 4px;
      box-shadow: var(--shadow-md);
    }
    .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--bg-main); }
    .title { font-size: 1.25rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .verified { color: #1DA1F2; font-size: 1.2rem; }
    .bio { color: var(--text-muted); font-size: 0.9rem; margin-top: 8px; }

    /* Links Box */
    .link-box {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; margin-bottom: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
    }
    .link-box:hover {
      background: var(--bg-card-hover); border-color: var(--primary);
      transform: scale(1.02);
    }
    .link-left { display: flex; align-items: center; gap: 12px; font-weight: 600; }
    .link-icon { font-size: 1.5rem; color: var(--secondary); }

    /* Product Grid */
    .section-heading { font-size: 1.1rem; margin: 32px 0 16px; display: flex; align-items: center; justify-content: space-between;}
    .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .product-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-md); overflow: hidden;
      transition: all 0.3s ease;
    }
    .product-card:hover { transform: translateY(-4px); border-color: var(--secondary); box-shadow: var(--shadow-glow); }
    .img-wrap { position: relative; padding-top: 100%; }
    .img-wrap img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    .price-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; backdrop-filter: blur(4px);}
    .product-detail { padding: 12px; }
    .product-title { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .buy-btn { width: 100%; padding: 8px; margin-top: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: var(--radius-sm); color: #fff; font-size: 0.85rem; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 6px;}
    .buy-btn:hover { background: var(--primary); border-color: var(--primary); }

  </style>
</head>
<body>

  <div class="mobile-container">
    
    <!-- Profile -->
    <header class="profile-section">
      <div class="avatar-wrapper">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500&auto=format&fit=crop" alt="Profile" class="avatar">
      </div>
      <h1 class="title">Aesthetic Studio <i class="ph-fill ph-seal-check verified"></i></h1>
      <p class="bio">📍 Jakarta | Home Decor Minimalis<br>Diskon 10% untuk follower baru!</p>
    </header>

    <!-- Priority Links -->
    <main>
      <a href="#" class="link-box">
        <div class="link-left">
          <i class="ph ph-whatsapp-logo link-icon" style="color: #25D366;"></i>
          Chat Admin (Fast Respon)
        </div>
        <i class="ph ph-caret-right text-muted"></i>
      </a>
      <a href="#" class="link-box">
        <div class="link-left">
          <i class="ph ph-shopping-bag link-icon" style="color: #EE4D2D;"></i>
          Voucher Shopee 50K
        </div>
        <i class="ph ph-caret-right text-muted"></i>
      </a>

      <!-- Mini Store -->
      <div class="section-heading">
        <h3>Katalog Terbaru</h3>
        <span class="badge premium">Lihat Semua</span>
      </div>

      <div class="product-grid">
        <!-- Product 1 -->
        <article class="product-card">
          <div class="img-wrap">
            <img src="https://images.unsplash.com/photo-1505693314120-0d443867891c?w=500&auto=format&fit=crop" alt="Product">
            <div class="price-tag">Rp 250k</div>
          </div>
          <div class="product-detail">
            <h4 class="product-title">Lampu Meja Nordik</h4>
            <button class="buy-btn"><i class="ph ph-shopping-cart"></i> Beli</button>
          </div>
        </article>

        <!-- Product 2 -->
        <article class="product-card">
          <div class="img-wrap">
            <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=500&auto=format&fit=crop" alt="Product">
            <div class="price-tag">Rp 450k</div>
          </div>
          <div class="product-detail">
            <h4 class="product-title">Kursi Kayu Jati</h4>
            <button class="buy-btn"><i class="ph ph-shopping-cart"></i> Beli</button>
          </div>
        </article>
      </div>
    </main>

    <!-- Branding Footer -->
    <div style="text-align: center; margin-top: 48px; font-size: 0.8rem; color: var(--text-muted);">
      <i class="ph-fill ph-lightning" style="color: var(--primary);"></i> Powered by <strong>LINKify</strong>
    </div>

  </div>
</body>
</html>
