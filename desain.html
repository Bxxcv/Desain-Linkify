<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Preview - LINKify</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #f5f7fa;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
  }

  .flow {
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 0;
  }

  svg#lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .row {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 60px;
    margin-bottom: 80px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }

  .col {
    display: flex;
    flex-direction: column;
    gap: 80px;
  }

  .node {
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-align: center;
  }

  .node img {
    display: block;
    width: 220px;
    max-width: 100%;
    height: auto;
    border-radius: 12px;
  }

  .node.phone img {
    width: 200px;
    border: 10px solid #111;
    border-radius: 32px;
  }

  .caption {
    margin-top: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
  }

  .templates {
    background: #eef2f7;
    border: 2px dashed #3b82f6;
    border-radius: 20px;
    padding: 40px 20px 20px;
    margin: 0 auto;
    max-width: 1100px;
    position: relative;
    z-index: 1;
  }

  .templates-label {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: #3b82f6;
    color: #fff;
    padding: 4px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
  }

  .templates-grid {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  @media (max-width: 768px) {
    .row { gap: 40px; margin-bottom: 50px; }
    .col { gap: 50px; }
    .node img { width: 180px; }
  }
</style>
</head>
<body>
  <div style="text-align:center; margin:40px 0;">
  <button id="exportBtn" style="background:#3b82f6; color:white; padding:12px 24px; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer;">
    📸 Download PNG Full HD
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<script>
  document.getElementById('exportBtn').addEventListener('click', () => {
    const btn = document.getElementById('exportBtn');
    const flow = document.querySelector('.flow');
    
    btn.textContent = '⏳ Lagi render...';
    btn.disabled = true;
    
    htmlToImage.toPng(flow, {
        quality: 1.0,
        pixelRatio: 3,
        backgroundColor: '#f5f7fa'
      })
      .then(function(dataUrl) {
        // Force download
        const link = document.createElement('a');
        link.download = 'flow-linkify-full.png';
        link.href = dataUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        btn.textContent = '✅ Selesai! Cek folder Download';
        setTimeout(() => {
          btn.textContent = '📸 Download PNG Full HD';
          btn.disabled = false;
        }, 3000);
      })
      .catch(function(error) {
        console.error('Oops, error:', error);
        btn.textContent = '❌ Gagal';
        alert('Gagal render. Pastikan lu buka file ini lewat Live Server / localhost, jangan double klik file html nya langsung.');
        btn.disabled = false;
      });
  });
</script>
<div class="flow">
  <svg id="lines"></svg>

  <div class="row">
    <div class="node phone" id="n1">
      <img src="upload/landing.jpg" alt="Landing Page">
      <div class="caption">Landing Page</div>
    </div>
  </div>

  <div class="row">
    <div class="node" id="n2">
      <img src="upload/login.jpg" alt="Login">
      <div class="caption">Login</div>
    </div>
    
    <div class="col">
      <div class="node" id="n3">
        <img src="upload/admin-produk.jpg" alt="Admin Produk">
        <div class="caption">Admin Produk</div>
      </div>
      
      <div class="node" id="n4">
        <img src="upload/admin-analitik.jpg" alt="Admin Analisis">
        <div class="caption">Admin Analisis</div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="node" id="n5">
      <img src="upload/admin-profil.jpg" alt="Admin Profil & Tema">
      <div class="caption">Admin Profil & Tema</div>
    </div>
  </div>

  <div class="templates" id="templates">
    <div class="templates-label">5 Template Tema</div>
    <div class="templates-grid">
      <div class="node" id="t1">
        <img src="img/dropship.jpg" alt="Template 1">
        <div class="caption">Template Dropship</div>
      </div>
      
      <div class="node" id="t2">
        <img src="img/kreator.jpg" alt="Template 2">
        <div class="caption">Template Kreator</div>
      </div>
      
      <div class="node" id="t3">
        <img src="img/kuliner.jpg" alt="Template 3">
        <div class="caption">Template Kuliner</div>
      </div>
      
      <div class="node" id="t4">
        <img src="img/skincare.jpg" alt="Template 4">
        <div class="caption">Template Skincare</div>
      </div>
      
      <div class="node" id="t5">
        <img src="img/gadget.jpg" alt="Template 5">
        <div class="caption">Template Gadget</div>
      </div>
    </div>
  </div>

</div>

<script>
let drawn = false;

function drawLines() {
  if (drawn) return; // cegah redraw berkali-kali
  
  const svg = document.getElementById('lines');
  svg.innerHTML = '';
  
  const getPos = (id) => {
    const el = document.getElementById(id);
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    const svgRect = svg.getBoundingClientRect();
    return {
      x: rect.left - svgRect.left + rect.width / 2,
      y: rect.top - svgRect.top + rect.height / 2,
      right: rect.right - svgRect.left,
      left: rect.left - svgRect.left,
      top: rect.top - svgRect.top,
      bottom: rect.bottom - svgRect.top
    };
  };

  const draw = (x1, y1, x2, y2, color='#3b82f6') => {
    const dx = Math.abs(x2 - x1) * 0.3;
    const path = `M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
    
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    line.setAttribute('d', path);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', '3');
    line.setAttribute('fill', 'none');
    svg.appendChild(line);

    const angle = Math.atan2(y2 - y1, x2 - x1);
    const size = 10;
    const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    const p1x = x2 - size * Math.cos(angle - Math.PI/6);
    const p1y = y2 - size * Math.sin(angle - Math.PI/6);
    const p2x = x2 - size * Math.cos(angle + Math.PI/6);
    const p2y = y2 - size * Math.sin(angle + Math.PI/6);
    arrow.setAttribute('points', `${x2},${y2} ${p1x},${p1y} ${p2x},${p2y}`);
    arrow.setAttribute('fill', color);
    svg.appendChild(arrow);
  };

  setTimeout(() => {
    const n1 = getPos('n1'), n2 = getPos('n2'), n3 = getPos('n3');
    const n4 = getPos('n4'), n5 = getPos('n5');
    const t1 = getPos('t1'), t2 = getPos('t2'), t3 = getPos('t3');
    const t4 = getPos('t4'), t5 = getPos('t5');

    if (!n1) return;

    draw(n1.x, n1.y + 110, n2.x, n2.y - 110);
    draw(n2.right, n2.y, n3.left, n3.y);
    draw(n2.x, n2.y + 110, n4.x, n4.y - 110);
    draw(n4.x, n4.y + 110, n5.x, n5.y - 110);
    draw(n3.x, n3.y + 110, n4.right, n4.y);

    if (t1) {
      draw(n5.x, n5.y + 110, t1.x, t1.y - 110, '#60a5fa');
      draw(n5.x, n5.y + 110, t2.x, t2.y - 110, '#60a5fa');
      draw(n5.x, n5.y + 110, t3.x, t3.y - 110, '#60a5fa');
      draw(n5.x, n5.y + 110, t4.x, t4.y - 110, '#60a5fa');
      draw(n5.x, n5.y + 110, t5.x, t5.y - 110, '#60a5fa');
    }

    drawn = true; // udah digambar, jangan diulang
  }, 300);
}

// Cuma jalan pas load dan resize. Scroll udah gak dipanggil lagi.
window.addEventListener('load', drawLines);
window.addEventListener('resize', () => {
  drawn = false; // reset biar gambar ulang pas resize
  drawLines();
});

document.querySelectorAll('img').forEach(img => {
  img.addEventListener('load', drawLines);
});
</script>

</body>
</html>
